# @package _global_
# python reg_transfo/main.py experiment=gnnqm8

defaults:
  - override /algorithm: schnet
  - override /datamodule: qm8
  - override /trainer: default

name: qm8_gnn

seed: ${oc.env:SLURM_PROCID,42}

algorithm:
  lr: 1e-4
  weight_decay: 1e-4
  hidden_channels: 80
  num_filters: 80
  num_interactions: 2

datamodule:
  batch_size: 64
  data:
    x_dim: 9
    y_dim: 16

trainer:
  min_epochs: 1
  max_epochs: 1000
