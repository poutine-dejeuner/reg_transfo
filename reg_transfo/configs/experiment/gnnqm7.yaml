# @package _global_
# python reg_transfo/main.py experiment=gnnqm7

defaults:
  - override /algorithm: schnet
  - override /datamodule: qm7
  - override /trainer: default

name: qm7_gnn

seed: ${oc.env:SLURM_PROCID,42}

algorithm:
  lr: 1e-4
  weight_decay: 1e-4
  hidden_channels: 48
  num_filters: 48
  num_interactions: 2

datamodule:
  batch_size: 64
  data:
    x_dim: 9
    y_dim: 1

trainer:
  min_epochs: 1
  max_epochs: 1000
