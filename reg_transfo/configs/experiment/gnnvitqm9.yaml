# @package _global_
# python reg_transfo/main.py experiment=example

defaults:
  - override /algorithm: gnnvit
  - override /datamodule: qm9
  - override /trainer: default


debug: true
name: qm9_gnnvit

seed: ${oc.env:SLURM_PROCID,42}

data:
  x_dim: 9
  y_dim: 12

algorithm:
  optimizer:
    lr: 0.002

datamodule:
  batch_size: 64

trainer:
  min_epochs: 1
  max_epochs: 10
  gradient_clip_val: 0.5
