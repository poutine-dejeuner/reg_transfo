# @package _global_
# python reg_transfo/main.py experiment=gnnvitqm9_frozen algorithm.schnet_checkpoint=path/to/schnet.ckpt

defaults:
  - override /algorithm: gnnvit_frozen
  - override /datamodule: qm9
  - override /trainer: default

name: qm9_gnnvit_frozen

seed: ${oc.env:SLURM_PROCID,42}

algorithm:
  schnet_checkpoint: /home/vincent/repos/topo-augment/reg-transfo/logs/qm9_gnn/runs/2026-03-03/14-46-34/checkpoints/last.ckpt
  optimizer:
    lr: 0.001
  network:
    schnet_hidden_channels: 192
    schnet_num_filters: 192
    schnet_num_interactions: 3
    vit_embed_dim: 80
    vit_depth: 4
    vit_num_heads: 4

datamodule:
  batch_size: 64
  data:
    x_dim: 9
    y_dim: 12

trainer:
  min_epochs: 1
  max_epochs: 1000
  gradient_clip_val: 0.5
